<!DOCTYPE html>
<html>
<head>
    <title>Hunter Sales KPIs - Mónica Acuña</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1a1a2e;color:white;font-family:Arial,sans-serif;padding:20px;line-height:1.6;}
        .container{max-width:1400px;margin:auto;}
        h1{text-align:center;color:#00d4ff;font-size:3em;margin:30px 0;text-shadow:0 0 20px #00d4ff;}
        h2{text-align:center;color:#aaa;font-size:1.5em;margin:20px 0;}
        
        .hero-img{display:block;margin:30px auto;max-width:500px;border:3px solid #00d4ff;border-radius:15px;box-shadow:0 10px 30px rgba(0,212,255,0.3);}
        
        .cta-big{
            text-align:center;background:linear-gradient(45deg,#003366,#00d4ff);padding:35px;border-radius:20px;
            margin:40px 0;border:3px solid #00d4ff;box-shadow:0 15px 35px rgba(0,0,0,0.5);
        }
        .cta-big h3{color:gold;font-size:2.5em;margin:0 0 15px;font-weight:bold;}
        .cta-big p{font-size:1.3em;color:white;margin:10px 0;}
        
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:30px;margin:50px 0;}
        .kpi-card{background:rgba(30,30,55,0.95);padding:30px;border-radius:20px;border:2px solid #444;transition:all 0.3s ease;}
        .kpi-card:hover{transform:translateY(-10px);border-color:#00d4ff;box-shadow:0 25px 50px rgba(0,212,255,0.2);}
        
        .kpi-card h3{color:#00d4ff;font-size:1.6em;margin:0 0 25px;font-weight:700;text-transform:uppercase;}
        label{display:block;color:#e0e0ff;font-weight:600;margin:15px 0 8px 0;font-size:1em;}
        input{width:100%;padding:14px;border:2px solid #666;border-radius:10px;background:rgba(60,60,90,0.8);color:white;font-size:16px;transition:all 0.3s;}
        input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 20px rgba(0,212,255,0.4);background:rgba(0,120,180,0.9);}
        
        .metric-display{
            background:linear-gradient(135deg,#00d4ff,#00ff88);color:#000;font-size:2.5em;font-weight:900;
            padding:25px;text-align:center;border-radius:15px;margin:20px 0;font-family:monospace;
            box-shadow:0 15px 35px rgba(0,212,255,0.4);text-shadow:0 2px 4px rgba(0,0,0,0.3);
        }
        
        .explanations{margin-top:70px;padding:50px;background:rgba(20,20,45,0.95);border-radius:25px;border:2px solid #00d4ff;}
        .explanations h3{color:#00d4ff;font-size:2.2em;text-align:center;margin-bottom:50px;}
        .exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:25px;}
        .exp-card{background:rgba(45,45,85,0.8);padding:30px;border-radius:18px;border-left:6px solid #00d4ff;}
        .exp-card h4{color:gold;font-size:1.4em;margin:0 0 20px;font-weight:700;}
        .exp-card p{font-size:1.1em;line-height:1.7;color:#e0e0ff;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🏹 Hunter Sales KPIs</h1>
        <img src="vlue cost.PNG" class="hero-img" alt="Valor vs Costo">
        <h2>Dashboard Interactivo - Performance Real Time</h2>
        
        <div class="cta-big">
            <h3>🎯 RETO VP SALES: Optimiza tu Dashboard</h3>
            <p><strong>Ingresa TUS números → Métricas se actualizan INSTANTÁNEAMENTE</strong></p>
            <p>¡Visualiza tu performance real de ventas en vivo!</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>01. MRR Growth</h3>
                <label>MRR Mes Anterior:</label><input type="number" id="mrr1" value="45000">
                <label>MRR Este Mes:</label><input type="number" id="mrr2" value="52000">
                <div class="metric-display" id="mrrResult">$<span>7,000</span> (+15.6%)</div>
            </div>

            <div class="kpi-card">
                <h3>02. CAC</h3>
                <label>Gasto Marketing:</label><input type="number" id="mk" value="18000">
                <label>Gasto Ventas:</label><input type="number" id="sales"
