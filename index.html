<!DOCTYPE html>
<html>

        body{background:linear-gradient(135deg,#000,#111);color:#fff;font-family:Arial,sans-serif;text-align:center;padding:20px}
        .container{max-width:1600px;margin:0 auto}
        h1{font-size:3em;color:#ffd700;text-shadow:0 0 30px #ffd700;margin:20px 0;animation:glow 2s ease-in-out infinite}

        img{max-width:90%;border-radius:20px;border:4px solid #ffd700;margin:20px 0;box-shadow:0 30px 80px #000}

        .kpi-explain{max-width:1600px;margin:80px auto;padding:50px;background:rgba(0,0,0,0.9);border-radius:30px;border:3px solid #ffd700;text-align:left;box-shadow:0 30px 100px rgba(0,0,0,0.8)}

        .kpi-explain h3{color:#ffd700;font-size:2em;margin:40px 0 20px 0;text-shadow:0 0 15px #ffd700}
        .why-section{background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,215,0,0.05));border-left:6px solid #ffd700;padding:40px;margin:60px 0;border-radius:20px;box-shadow:0 20px 60px rgba(255,215,0,0.2)}
        .cta-final{background:linear-gradient(45deg,#ff6b6b,#ffd700);color:#000;padding:50px;border-radius:30px;margin:60px 20px;font-size:1.8em;font-weight:900;box-shadow:0 30px 100px rgba(255,107,107,0.5)}
