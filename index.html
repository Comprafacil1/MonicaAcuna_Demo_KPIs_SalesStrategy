<!DOCTYPE html>
<html>
<head>
    <title>HUNTER SALES</title>
    <script src='https://cdn.plot.ly/plotly-latest.min.js'></script>
</head>
<body style='background:black;color:white;font-family:Arial;text-align:center;padding:20px'>
    <h1 style='color:gold;font-size:3em'>🥇 HUNTER SALES KPIs</h1>
    
    <div style='background:#111;padding:30px;border-radius:20px;max-width:800px;margin:20px auto;border:3px solid gold'>
        <div><label style='color:white;display:block'>Leads:</label><input id='l' value='147' style='padding:15px;width:200px'></div>
        <div><label style='color:white;display:block'>Win Rate %:</label><input id='w' value='32' style='padding:15px;width:200px'></div>
        <button onclick='plot()' style='padding:15px 30px;background:gold;color:black;font-weight:bold'>CALCULAR</button>
    </div>
    
    <h2 id='rank' style='color:gold;font-size:4em;display:none'>RANK: <span id='r'>0</span>/100</h2>
    
    <div id='charts' style='display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;max-width:1400px;margin:0 auto'></div>

    <script>
    function plot(){
        let leads=+document.getElementById('l').value||147;
        let winrate=(+document.getElementById('w').value||32)/100;
        let rank=Math.round(leads/200*30+winrate*100/40*60);
        
        document.getElementById('r').innerHTML=rank;
        document.getElementById('rank').style.display='block';
        
        let html='';
        html+=`<div style='height:300px'><div id='c1' style='width:100%;height:100%'></div></div>`;
        html+=`<div style='height:300px'><div id='c2' style='width:100%;height:100%'></div></div>`;
        html+=`<div style='height:300px'><div id='c3' style='width:100%;height:100%'></div></div>`;
        html+=`<div style='height:300px'><div id='c4' style='width:100%;height:100%'></div></div>`;
        document.getElementById('charts').innerHTML=html;
        
        Plotly.newPlot('c1', [{values:[winrate*100,100-winrate*100],type:'pie',hole:0.6}], {paper_bgcolor:'#111',plot_bgcolor:'#111',font:{color:'white'}});
        Plotly.newPlot('c2', [{values:[leads*winrate,leads*(1-winrate)],type:'pie',hole:0.6}], {paper_bgcolor:'#111',plot_bgcolor:'#111'});
        Plotly.newPlot('c3', [{values:[75,25],type:'pie',hole:0.6}], {paper_bgcolor:'#111',plot_bgcolor:'#111'});
        Plotly.newPlot('c4', [{values:[rank,100-rank],type:'pie',hole:0.6}], {paper_bgcolor:'#111',plot_bgcolor:'#111'});
    }
    plot();
    </script>
</body>
</html>
