<!DOCTYPE html>
<html>
<head>
    <title>🥇 HUNTER LEGEND - Logística Mundial</title>
    <script src='https://cdn.plot.ly/plotly-latest.min.js'></script>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #000, #111, #000); 
            color: #fff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px;
            overflow-x: hidden;
        }
        .neon-glow { 
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #game { 
            margin: 20px auto; 
            max-width: 1200px; 
            background: rgba(0,0,0,0.8); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #ffd700;
        }
        input, select { 
            padding: 18px; 
            margin: 10px; 
            background: #111; 
            color: #0ff; 
            border: 3px solid #ffd700; 
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 200px;
        }
        button { 
            padding: 20px 40px; 
            background: linear-gradient(45deg, #ffd700, #ffed4a); 
            color: #000; 
            border: none; 
            border-radius: 15px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 18px;
            margin: 10px;
            text-transform: uppercase;
        }
        .rank-display {
            font-size: 6em; 
            color: #ffd700; 
            margin: 40px 0;
            font-weight: 900;
            text-shadow: 0 0 40px #ffd700;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            max-width: 1800px;
            margin: 40px auto;
        }
        .dash { 
            height: 420px !important; 
            border: 3px solid #ffd700; 
            border-radius: 20px;
            background: rgba(17,17,17,0.95) !important;
            box-shadow: 0 20px 60px rgba(255,215,0,0.3);
            position: relative;
        }
        .dash-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 20px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.3em;
            z-index: 10;
            border: 2px solid #ffd700;
        }
        h1 { 
            color: #ffd700; 
            font-size: 4.5em; 
            margin-bottom: 10px;
            text-shadow: 0 0 40px #ffd700;
        }
        h2 { 
            color: #ff6b6b; 
            font-size: 2.2em;
            margin: 50px 0 30px 0;
            text-shadow: 0 0 25px #ff6b6b;
        }
        .kpi-explain {
            max-width: 1600px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: left;
            background: rgba(0,0,0,0.7);
            border-radius: 25px;
            padding: 40px;
        }
        .kpi-explain h3 {
            color: #ffd700;
            font-size: 1.6em;
            margin: 30px 0 15px 0;
            text-shadow: 0 0 15px #ffd700;
        }
        .kpi-detail {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin: 20px 0;
        }
        @media (max-width: 768px) {
            .rank-display { font-size: 4em; }
            h1 { font-size: 3em; }
            input, select { width: 100%; max-width: 280px; }
            .dash-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
