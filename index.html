<!DOCTYPE html>
<html>
<head>
    <title>🥇 HUNTER SALES - 4 Fases Éxito</title>
    <script src='https://cdn.plot.ly/plotly-latest.min.js'></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:Arial;text-align:center;padding:20px}
        .container{max-width:1600px;margin:0 auto}
        h1{font-size:3em;color:#ffd700;text-shadow:0 0 30px #ffd700;margin:20px 0}
        img{max-width:90%;border-radius:20px;border:4px solid #ffd700;margin:20px 0;box-shadow:0 30px 80px #000}
        #controls{background:rgba(17,17,17,0.9);padding:30px;border-radius:20px;border:3px solid #ffd700;margin:20px 0}
        label{display:block;margin:10px 0 5px 0;color:#fff;font-weight:bold;font-size:14px}
        input{padding:15px;margin:5px 0;background:#111;color:#fff;border:2px solid #ffd700;border-radius:10px;font-size:16px;width:220px}
        button{padding:15px 30px;background:#ffd700;color:#000;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:10px;font-size:16px}
        button:hover{transform:scale(1.05);box-shadow:0 10px 30px #ffd70040}
        .rank{font-size:4em;color:#ffd700;margin:40px 0;font-weight:900;text-shadow:0 0 40px #ffd700;display:none}
        .cta-final{background:linear-gradient(45deg,#ff6b6b,#ffd700);color:#000;padding:40px;border-radius:25px;margin:40px 20px;font-size:1.6em;font-weight:bold;box-shadow:0 20px 60px #ff6b6b40}
        .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:25px;margin:40px 0}
        .dash{position:relative;height:400px;border:3px solid #ffd700;border-radius:20px;background:rgba(17,17,17,0.95)!important;overflow:hidden}
        .dash-title{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:8px 20px;border-radius:15px;font-weight:bold;font-size:14px;z-index:10;border:2px solid #ffd700}
        .phase-header{background:linear-gradient(90deg,#ff6b6b,#ffd700,#4ecdc4);color:#000;padding:20px;border-radius:15px;margin:40px 20px;font-size:1.4em;font-weight:bold}
        .kpi-explain{max-width:1600px;margin:60px auto;padding:40px;background:rgba(0,0,0,0.8);border-radius:25px;text-align:left}
        .kpi-explain h2{color:#ffd700;font-size:2em;margin-bottom:30px}
        .kpi-explain h3{color:#ffd700;font-size:1.6em;margin:30px 0 15px 0}
        .kpi-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:25px}
        .why-section{background:rgba(255,215,0,0.1);border-left:5px solid #ffd700;padding:30px;margin:40px 0;border-radius:10px}
        @media(max-width:768px){.dash-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

        <h1>🥇 HUNTER SALES - 4 Fases Éxito</h1>

            <h3 style="color:#ffd700;margin-bottom:25px">📈 FASES: Atraer → Vender → Satisfacer → Fidelizar</h3>
            <div>
                <label>👥 Leads Mensuales</label>
                <input id="leads" value="147" type="number">

                <input id="winrate" value="32" type="number">

            <div>
                <label>💰 LTV Cliente $</label>
                <input id="ltv" value="450000" type="number">
            </div>
            <button onclick="runGame()">🔥 CALCULAR 8 KPIs</button>
            <button onclick="saveGame()">🏆 SHARE RANK</button>

        </div>
