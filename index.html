<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Dashboard KPI Ventas Hunter - Interactúa Ahora</title>
    <script src='https://cdn.plot.ly/plotly-2.35.2.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1e1e1e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; }
        .main-title { 
            font-size: 4rem; 
            font-weight: 900; 
            background: linear-gradient(45deg, #b8b8ff, #e0e0ff, #d4b8ff); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(184,184,255,0.5);
            letter-spacing: 2px;
        }
        .header img { 
            max-width: 900px; 
            width: 100%; 
            height: auto; 
            border-radius: 25px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            margin: 30px 0;
        }
        .chic-subtitle { 
            font-size: 1.6rem; 
            font-weight: 300; 
            color: #b8b8ff; 
            max-width: 700px; 
            margin: 0 auto 40px;
            line-height: 1.5;
            font-style: italic;
        }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 30px; margin: 50px 0; }
        .card { 
            background: rgba(40,40,40,0.9); 
            backdrop-filter: blur(20px); 
            border-radius: 25px; 
            padding: 30px; 
            border: 1px solid rgba(184,184,255,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 40px 80px rgba(0,0,0,0.5); border-color: #b8b8ff; }
        .card h3 { color: #b8b8ff; font-size: 1.8rem; margin-bottom: 25px; text-align: center; }
        .control-panel { 
            background: rgba(30,30,30,0.95); 
            padding: 30px; 
            border-radius: 25px; 
            margin-bottom: 40px;
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap;
            border: 1px solid rgba(184,184,255,0.2);
        }
        input, select { 
            padding: 15px 25px; 
            border: 2px solid rgba(184,184,255,0.3); 
            border-radius: 30px; 
            background: #2a2a2a; 
            color: #e0e0e0; 
            font-weight: 600;
            transition: all 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #b8b8ff; box-shadow: 0 0 20px rgba(184,184,255,0.3); }
        button { 
            padding: 18px 35px; 
            background: linear-gradient(45deg, #b8b8ff, #d4b8ff); 
            color: #1a1a1a; 
            border: none; 
            border-radius: 30px; 
            font-weight: 800; 
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { transform: scale(1.08); box-shadow: 0 15px 40px rgba(184,184,255,0.4); }
        .kpi-explanation { 
            columns: 2; 
            column-gap: 50px; 
            font-size: 1.15rem; 
            line-height: 1.7;
            margin-top: 100px;
            padding: 50px;
            background: rgba(20,20,20,0.8);
            border-radius: 30px;
            margin-bottom: 50px;
        }
