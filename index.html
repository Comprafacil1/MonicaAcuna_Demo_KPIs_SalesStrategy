    <style>

            color: #fff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px;
            overflow-x: hidden;
        }
        .neon-glow { 
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #game { 
            margin: 20px auto; 
            max-width: 1200px; 
            background: rgba(0,0,0,0.8); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #ffd700;
        }
        input, select { 
            padding: 18px; 
            margin: 10px; 
            background: #111; 
            color: #0ff; 
            border: 3px solid #ffd700; 
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 200px;
        }
        button { 
            padding: 20px 40px; 
            background: linear-gradient(45deg, #ffd700, #ffed4a); 
            color: #000; 
            border: none; 
            border-radius: 15px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 18px;
            margin: 10px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,215,0,0.5);
        }
        .rank-display {
            font-size: 6em; 
            color: #ffd700; 
            margin: 40px 0;
            font-weight: 900;
            text-shadow: 0 0 40px #ffd700;
        }
        .dash { 
            height: 380px; 
            margin: 20px 0; 
            border: 3px solid #ffd700; 
            border-radius: 20px;
            background: rgba(17,17,17,0.95) !important;
            box-shadow: 0 20px 60px rgba(255,215,0,0.3);
        }
        h1 { 
            color: #ffd700; 
            font-size: 4.5em; 
            margin-bottom: 10px;
            text-shadow: 0 0 40px #ffd700;
        }
        h2 { 
            color: #ff6b6b; 
            font-size: 2.2em;
            margin: 40px 0 30px 0;
            text-shadow: 0 0 25px #ff6b6b;
        }
        h3 { 
            color: #4ecdc4; 
            font-size: 1.8em;
            margin-bottom: 20px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1600px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .kpi-box {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,107,107,0.15), rgba(78,205,196,0.15));
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4, #0ff) 1;
            border-radius: 25px;
            padding: 35px;
            text-align: left;
            box-shadow: 0 25px 70px rgba(255,215,0,0.25);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .kpi-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.7s;
        }
        .kpi-box:hover::before { left: 100%; }
        .kpi-box:hover {
            transform: translateY(-20px) scale(1.03);
            box-shadow: 0 40px 100px rgba(255,215,0,0.5);
        }
        .kpi-icon {
            font-size: 3.5em;
            display: block;
            margin-bottom: 20px;
            text-shadow: 0 0 25px currentColor;
        }
        .kpi-title {
            color: #ffd700;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 18px;
            text-shadow: 0 0 20px #ffd700;
        }
        .kpi-importance {
            color: #4ecdc4;
            font-size: 1.3em;
            font-weight: 900;
            margin: 20px 0 15px 0;
            text-shadow: 0 0 15px #4ecdc4;
        }
        .legend-score {
            color: #ff6b6b;
            font-size: 1.5em;
            font-weight: 900;
            background: rgba(255,107,107,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .rank-display { font-size: 4em; }
            h1 { font-size: 3em; }
            input, select { width: 100%; max-width: 280px; }
        }
    </style>
</head>
