<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Sales KPIs - SaaS Game</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 20px; 
            background: #1a1a2e; 
            color: #ffffff; 
        }
        .container { max-width: 1400px; margin: auto; }
        h1 { text-align: center; color: #00d4ff; font-size: 3em; text-shadow: 0 0 20px #00d4ff; }
        h2 { text-align: center; color: #a0a0ff; font-size: 1.5em; margin: 20px 0 40px; }
        
        .cta-game { 
            text-align: center; 
            background: rgba(0,212,255,0.1); 
            padding: 30px; 
            border-radius: 15px; 
            border: 2px solid #00d4ff; 
            margin: 30px 0; 
        }
        .cta-game h3 { color: #ffd700; font-size: 2em; margin: 0; }
        
        .image-center { text-align: center; margin: 30px 0; }
        .image-center img { max-width: 500px; height: auto; border-radius: 15px; border: 2px solid #00d4ff; box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; margin: 40px 0; }
        .kpi-box { 
            background: rgba(30,30,50,0.9); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #444; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .kpi-box h3 { margin: 0 0 20px; color: #00d4ff; font-size: 1.4em; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; color: #e0e0ff; font-weight: bold; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #555; border-radius: 8px; 
            background: #333; color: #fff; font-size: 1em; 
        }
        .input-group input:focus { border-color: #00d4ff; outline: none; box-shadow: 0 0 10px #00d4ff; }
        .chart-container { position: relative; height: 280px; margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        .explanations { margin-top: 60px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .kpi-explain { background: rgba(20,20,40,0.9); padding: 20px; border-radius: 10px; border-left: 4px solid #00d4ff; }
        .kpi-explain h4 { color: #ffd700; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hunter Sales KPIs</h1>
        <div class="image-center">
            <img src="vlue cost.PNG" alt="Valor vs Costo">
        </div>
        <h2>Valor vs Costo</h2>
        
        <!-- CTA JUEGO -->
        <div class="cta-game">
            <h3>🎮 CAMBIA LOS NÚMEROS → VE LOS GRÁFICOS ACTUALIZARSE</h3>
            <p>¡Este es tu dashboard SaaS! Modifica cualquier input y observa la magia.</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-box">
                <h3>1. MRR Growth</h3>
                <div class="input-group">
                    <label>MRR Anterior ($):</label>
                    <input type="number" id="mrr1" value="45000">
                </div>
                <div class="input-group">
                    <label>MRR Actual ($):</label>
                    <input type="number" id="mrr2" value="52000">
                </div>
                <div class="chart-container"><canvas id="c1"></canvas></div>
            </div>

            <div class="kpi-box">
                <h3>2. CAC</h3>
                <div class="input-group">
                    <label>Gasto Marketing ($):</label>
                    <input type="number" id="mk" value="18000">
                </div>
                <div class="input-group">
                    <label>Gasto Ventas ($):</label>
                    <input type="number" id="sales" value="32000">
                </div>
                <div class="input-group">
                    <label>Clientes Nuevos:</label>
                    <input type="number" id="newcust" value="42">
                </div>
                <div class="chart-container"><canvas id="c2"></canvas></div>
            </div>

            <div class="kpi-box">
                <h3>3. LTV/CAC Ratio</h3>
                <div class="input-group">
                    <label>LTV ($):</label>
                    <input type="number" id="ltv" value="48000">
                </div>
                <div class="input-group">
                    <label>CAC ($):</label>
                    <input type="number" id="cac" value="11810">
                </div>
                <div class="chart-container"><canvas id="c3"></canvas></div>
            </div>

            <div class="kpi-box">
                <h3>4. Conversion Rate</h3>
                <div class="input-group">
                    <label>Leads SQL:</label>
                    <input type="number" id="sql" value="650">
                </div>
                <div class="input-group">
                    <label>Leads Convertidos:</label>
                    <input type="number" id="conv" value="78">
                </div>
                <div class="chart-container"><canvas id="c4"></canvas></div>
            </div>

            <div class="kpi-box">
                <h3>5. Win Rate</h3>
                <div class="input-group">
                    <label>Deals Ganados:</label>
                    <input type="number" id="wins" value="52">
                </div>
                <div class="input-group">
                    <label>Deals Total:</label>
                    <input type="number" id="totaldeals" value="187">
                </div>
                <div class="chart-container"><canvas id="c5"></canvas></div>
            </div>

            <div class="kpi-box">
                <h3>6. Pipeline Value</h3>
                <div class="input-group">
                    <label>Oportunidades:</label>
                    <input type="number" id="ops" value="135">
                </div>
                <div class="input-group">
                    <label>Valor Promedio ($):</label>
                    <input type="number" id="avgval" value="9200">
