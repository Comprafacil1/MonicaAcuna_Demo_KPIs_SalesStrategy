<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Sales KPIs - Demo Mónica Acuña</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #333; }
        h2 { text-align: center; color: #666; margin-top: 10px; }
        .image-center { text-align: center; margin: 20px 0; }
        .image-center img { max-width: 400px; height: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 40px; }
        .kpi-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kpi-box h3 { margin-top: 0; color: #333; }
        .input-group { margin: 10px 0; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        canvas { max-height: 250px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hunter Sales KPIs</h1>
        <div class="image-center">
            <img src="imagen.jpg" alt="Imagen principal Hunter Sales"> <!-- Sube tu imagen como 'imagen.jpg' al repo -->
        </div>
        <h2>Valor vs Costo</h2>
        
        <div class="kpi-grid">
            <!-- KPI 1: Ingresos vs Costos -->
            <div class="kpi-box">
                <h3>Ingresos vs Costos</h3>
                <div class="input-group">
                    <label>Ingresos Totales ($):</label>
                    <input type="number" id="ingresos" value="100000" min="0">
                </div>
                <div class="input-group">
                    <label>Costos Totales ($):</label>
                    <input type="number" id="costos" value="60000" min="0">
                </div>
                <canvas id="chart1"></canvas>
            </div>

            <!-- KPI 2: Tasa de Conversión -->
            <div class="kpi-box">
                <h3>Tasa de Conversión (%)</h3>
                <div class="input-group">
                    <label>Leads Generados:</label>
                    <input type="number" id="leads" value="500" min="0">
                </div>
                <div class="input-group">
                    <label>Ventas Cerradas:</label>
                    <input type="number" id="ventas" value="50" min="0">
                </div>
                <canvas id="chart2"></canvas>
            </div>

            <!-- KPI 3: CAC (Costo Adquisición Cliente) -->
            <div class="kpi-box">
                <h3>CAC (Costo por Cliente)</h3>
                <div class="input-group">
                    <label>Gastos Marketing ($):</label>
                    <input type="number" id="marketing" value="20000" min="0">
                </div>
                <div class="input-group">
                    <label>Salarios Ventas ($):</label>
                    <input type="number" id="salarios" value="30000" min="0">
                </div>
                <div class="input-group">
                    <label>Clientes Nuevos:</label>
                    <input type="number" id="clientes" value="100" min="1">
                </div>
                <canvas id="chart3"></canvas>
            </div>

            <!-- KPI 4: Pipeline Value -->
            <div class="kpi-box">
                <h3>Valor Pipeline</h3>
                <div class="input-group">
                    <label>Oportunidades:</label>
                    <input type="number" id="oportunidades" value="20" min="0">
                </div>
                <div class="input-group">
                    <label>Valor Promedio por Oportunidad ($):</label>
                    <input type="number" id="valorOport" value="5000" min="0">
                </div>
                <canvas id="chart4"></canvas>
            </div>

            <!-- KPI 5: Win Rate -->
            <div class="kpi-box">
                <h3>Win Rate (%)</h3>
                <div class="input-group">
                    <label>Propuestas Presentadas:</label>
                    <input type="number" id="propuestas" value="100" min="0">
                </div>
                <div class="input-group">
                    <label>Propuestas Ganadas:</label>
                    <input type="number" id="ganadas" value="25" min="0">
                </div>
                <canvas id="chart5"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Función para actualizar todos los gráficos
        function actualizarGraficos() {
            // Chart 1: Ingresos vs Costos (Barra)
            const ctx1 = document.getElementById('chart1').getContext('2d');
            const ingresos = parseFloat(document.getElementById('ingresos').value) || 0;
            const costos = parseFloat(document.getElementById('costos').value) || 0;
            if (window.chart1) chart1.destroy();
            window.chart1 = new Chart(ctx1, {
                type: 'bar',
                data: { labels: ['Ingresos', 'Costos'], datasets: [{ label: 'Valor ($)', data: [ingresos, costos], backgroundColor: ['#28a745', '#dc3545'] }] },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            // Chart 2: Tasa Conversión (Doughnut)
            const ctx2 = document.getElementById('chart2').getContext('2d');
            const leads = parseFloat(document.getElementById('leads').value) || 0;
            const ventasC = parseFloat(document.getElementById('ventas').value) || 0;
            const tasa = leads > 0 ? (ventasC / leads * 100) : 0;
            if (window.chart2) chart2.destroy();
            window.chart2 = new Chart(ctx2, {
                type: 'doughnut',
                data: { labels: ['Convertidos', 'No Convertidos'], datasets: [{ data: [tasa, 100 - tasa], backgroundColor: ['#007bff', '#6c757d'] }] },
                options: { responsive: true }
            });

            // Chart 3: CAC (Gauge simulado con Doughnut)
            const ctx3 = document.getElementById('chart3').getContext('2d');
            const marketing = parseFloat(document.getElementById('marketing').value) || 0;
            const salariosV = parseFloat(document.getElementById('salarios').value) || 0;
            const clientesN = parseFloat(document.getElementById('clientes').value) || 1;
            const cac = (marketing + salariosV) / clientesN;
            if (window.chart3) chart3.destroy();
            window.chart3 = new Chart(ctx3, {
                type: 'doughnut',
                data: { labels: ['CAC ($)', 'Benchmark'], datasets: [{ data: [cac, 500], backgroundColor: ['#ffc107', '#28a745'] }] }, // Benchmark ejemplo $500 [web:1]
                options: { responsive: true }
            });

            // Chart 4: Pipeline (Barra)
            const ctx4 = document.getElementById('chart4').getContext('2d');
            const oportunidades = parseFloat(document.getElementById('oportunidades').value) || 0;
            const valorO = parseFloat(document.getElementById('valorOport').value) || 0;
            const pipeline = oportunidades * valorO;
            if (window.chart4) chart4.destroy();
            window.chart4 = new Chart(ctx4, {
                type: 'bar',
                data: { labels: ['Pipeline Total'], datasets: [{ label: 'Valor ($)', data: [pipeline], backgroundColor: '#17a2b8' }] },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            // Chart 5: Win Rate (Doughnut)
            const ctx5 = document.getElementById('chart5').getContext('2d');
            const propuestas = parseFloat(document.getElementById('propuestas').value) || 0;
            const ganadasP = parseFloat(document.getElementById('ganadas').value) || 0;
            const winrate = propuestas > 0 ? (ganadasP / propuestas * 100) : 0;
            if (window.chart5) chart5.destroy();
            window.chart5 = new Chart(ctx5, {
                type: 'doughnut',
                data: { labels: ['Ganadas', 'Perdidas'], datasets: [{ data: [winrate, 100 - winrate], backgroundColor: ['#28a745', '#dc3545'] }] },
                options: { responsive: true }
            });
        }

        // Event listeners para inputs
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', actualizarGraficos);
        });

        // Inicializar gráficos
        window.onload = actualizarGraficos;
    </script>
</body>
</html>
