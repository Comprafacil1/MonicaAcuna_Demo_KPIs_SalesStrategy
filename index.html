<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏹 HUNTER KPI - Pipeline Killer</title>
    <script src='https://cdn.plot.ly/plotly-2.35.2.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1500px; margin: 0 auto; padding: 0 20px; }
        
        /* HEADER ULTRA CHIC */
        .header { 
            text-align: center; 
            padding: 60px 20px 20px;
            position: relative;
        }
        .logo-hunter {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #7c3aed, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        .power-subtitle {
            font-size: 1.4rem;
            color: #a0a0ff;
            font-weight: 500;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .header img { 
            max-width: 1000px; 
            width: 100%; 
            border-radius: 24px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            margin-bottom: 20px;
        }
        
        /* GAME MODE */
        .game-title {
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.2rem;
            font-weight: 900;
            text-align: center;
            margin: 20px 0 40px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 20px #ff6b6b); }
            to { filter: drop-shadow(0 0 30px #4ecdc4); }
        }
        
        /* CONTROL ULTRA */
        .control-neon {
            background: rgba(20,20,20,0.95);
            padding: 35px;
            border-radius: 30px;
            margin-bottom: 50px;
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            backdrop-filter: blur(30px);
        }
        .control-neon::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #feca57, #ff6b6b);
            border-radius: 30px;
            z-index: -1;
            animation: borderRotate 3s linear infinite;
        }
        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            align-items: end;
        }
        input, select {
            padding: 18px 24px;
            border: 2px solid #333;
            border-radius: 25px;
            background: #1a1a1a;
            color: #f0f0f0;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }
        .btn-hunter {
            padding: 20px 40px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .btn-hunter::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
