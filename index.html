<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hunter Sales KPIs Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="container">

<h1>Hunter Sales KPI´s</h1>

<div class="hero-image">

<img src="assets/value_cost.png">

<h2>Valor vs Costo</h2>

</div>


<div class="grid">

<div class="card">
<h3>MRR Growth</h3>
<input id="clientes" type="number" value="30">
<input id="arpu" type="number" value="1200">
<div id="mrrChart"></div>
</div>

<div class="card">
<h3>CAC</h3>
<input id="marketing" type="number" value="20000">
<input id="sales" type="number" value="30000">
<input id="clientesCAC" type="number" value="40">
<div id="cacChart"></div>
</div>

<div class="card">
<h3>LTV / CAC</h3>
<input id="ltv" type="number" value="25000">
<div id="ltvChart"></div>
</div>

<div class="card">
<h3>Conversion Rate</h3>
<input id="leads" type="number" value="900">
<input id="closed" type="number" value="90">
<div id="conversionChart"></div>
</div>

<div class="card">
<h3>Pipeline Value</h3>
<input id="opps" type="number" value="150">
<input id="avgDeal" type="number" value="10000">
<div id="pipelineChart"></div>
</div>

<div class="card">
<h3>Win Rate</h3>
<input id="wins" type="number" value="60">
<input id="deals" type="number" value="200">
<div id="winChart"></div>
</div>

<div class="card">
<h3>Churn Rate</h3>
<input id="clientesInicio" type="number" value="500">
<input id="clientesLost" type="number" value="15">
<div id="churnChart"></div>
</div>

<div class="card">
<h3>Sales Velocity</h3>
<input id="dealsMes" type="number" value="35">
<input id="ciclo" type="number" value="40">
<div id="velocityChart"></div>
</div>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
